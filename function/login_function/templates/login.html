<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barangay System - Login</title>
  <!-- Bootstrap 4 CDN (Matches user current version) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #3498db;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Using the cinematic generated background */
      background: #b6a897;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      perspective: 1000px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      padding: 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      color: white;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-area img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: white;
      padding: 5px;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    .logo-area h2 {
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .logo-area p {
      font-weight: 300;
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .form-group label {
      font-weight: 400;
      font-size: 0.9rem;
      margin-bottom: 8px;
      display: block;
    }

    .input-group {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
    }

    .input-group-text {
      background: transparent;
      border: none;
      color: white;
      padding-left: 15px;
    }

    .form-control {
      background: transparent;
      border: none;
      color: white;
      height: 50px;
      padding-left: 5px;
    }

    .form-control:focus {
      background: transparent;
      border: none;
      box-shadow: none;
      color: white;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .btn-login {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(45deg, #3498db, #2980b9);
      border: none;
      color: white;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      filter: brightness(1.1);
    }

    .helper-text {
      text-align: center;
      margin-top: 25px;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .helper-text a {
      color: #3498db;
      text-decoration: none;
      font-weight: 500;
    }

    /* Credentials Tooltip/Badge */
    .demo-credentials {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
      font-size: 0.8rem;
      border: 1px dashed rgba(255, 255, 255, 0.2);
    }

    .demo-credentials code {
      color: #f1c40f;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="glass-card">
      <div class="logo-area">
        <!-- Using the local logo if path is correct, else placeholder -->
        <img src="/media/logo/barangay_tibay.png" alt="Barangay Logo"
          onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
        <h2>Barangay System</h2>
        <p>Official Portal Access</p>
      </div>

      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
            </div>
            <input type="email" name="username" class="form-control" placeholder="Enter email" required>
          </div>
        </div>

        <div class="form-group mb-4">
          <label>Password</label>
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
            </div>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-login">SIGN IN</button>
      </form>

      <div class="demo-credentials">
        <i class="bi bi-info-circle mr-1"></i> Demo Access:<br>
        User: <code>admin@gmail.com</code> | Pass: <code>admin</code>
      </div>

      <p class="helper-text">
        Forgot password? <a href="#">Contact Admin</a>
      </p>
    </div>
  </div>

</body>

</html>
